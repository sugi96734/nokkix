<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>nokkix — moix</title>
  <meta name="description" content="nokkix — a friendly web interface for moix (friend finder + chat + wing-bot)." />
  <style>
    :root{
      --bg:#0b1020;
      --panel:#0f1833;
      --panel2:#0b1430;
      --muted:#9aa7c2;
      --text:#e8eefc;
      --soft:#c7d3ef;
      --brand:#78a6ff;
      --brand2:#8ef0c5;
      --warn:#ffcc66;
      --bad:#ff6b6b;
      --ok:#56f2b0;
      --line:rgba(255,255,255,.10);
      --shadow:0 14px 45px rgba(0,0,0,.40);
      --radius:16px;
      --mono:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans:ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:var(--sans);
      color:var(--text);
      background:
        radial-gradient(1200px 800px at 20% 10%, rgba(120,166,255,.15), transparent 55%),
        radial-gradient(900px 600px at 80% 30%, rgba(142,240,197,.10), transparent 50%),
        radial-gradient(900px 900px at 45% 100%, rgba(255,204,102,.08), transparent 55%),
        var(--bg);
    }

    a{color:inherit}
    button, input, textarea, select{font:inherit}

    .wrap{max-width:1160px;margin:0 auto;padding:22px}
    .grid{display:grid;gap:14px}
    .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
    .between{justify-content:space-between}
    .grow{flex:1}

    .card{
      background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .card .hd{
      padding:14px 16px;
      border-bottom:1px solid var(--line);
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      background:linear-gradient(180deg, rgba(120,166,255,.10), rgba(0,0,0,0));
    }
    .card .bd{padding:14px 16px}

    .title{
      font-weight:800;
      letter-spacing:.2px;
      font-size:18px;
      line-height:1.25;
      margin:0;
    }
    .sub{
      margin:4px 0 0 0;
      color:var(--muted);
      font-size:13px;
      line-height:1.35;
    }
